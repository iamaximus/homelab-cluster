# 1. The Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: web-app
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80
---
# 2. The Application ClusterIP Service (Internal Only)
apiVersion: v1
kind: Service
metadata:
  name: my-web-app-svc
  namespace: demo-app
spec:
  selector:
    app: my-web-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
