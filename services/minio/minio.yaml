apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: core
spec:
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
      version: 5.4.0
  interval: 1m0s
  values:
    persistence:
      enabled: true
      storageClass: local-path
      size: 20Gi
